# SecureStats full-stack — `docker compose up --build`
#
#   db        → Postgres 16 with a named volume for persistence
#   backend   → FastAPI; runs `alembic upgrade head` then uvicorn
#   frontend  → React (Vite) served by nginx; proxies /api → backend
#
# Frontend is exposed on http://localhost:8080. The backend is reached
# through the frontend's nginx proxy (it's not published to the host).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Force the compose-internal hostname even if the .env points at
      # localhost for host-mode development.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    # Published on the host so OpenAPI docs at http://localhost:8000/docs
    # work out of the box. Production deployments should remove this and
    # rely on the nginx /api proxy only.
    # IPv4-only bind — Docker Desktop's IPv6 forwarder on WSL2 sometimes
    # stalls instead of cleanly refusing, which makes Chrome's happy-
    # eyeballs wait the full timeout on every request. Binding 127.0.0.1
    # only makes the v6 attempt instantly refused so the fallback to v4
    # is instant.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:         ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval:     30s
      timeout:      5s
      retries:      3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        # SPA hits /api/v1 on its own nginx, which proxies to backend.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # IPv4-only — see the matching note on backend's ports above.
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval:     30s
      timeout:      3s
      retries:      3
      start_period: 5s

volumes:
  postgres_data:
