# SecureStats frontend — single-page app served from /, with /api/*
# reverse-proxied to the FastAPI backend service.

# Resolver for the backend hostname. In docker-compose, services
# resolve via the embedded DNS at 127.0.0.11.
resolver 127.0.0.11 valid=30s ipv6=off;

# Allow override via $BACKEND_URL at runtime; otherwise default to the
# docker-compose service name.
map $host $upstream_backend {
    default "http://backend:8000";
}

server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Cap upload size — the API only accepts small JSON payloads.
    client_max_body_size 1m;

    # ─── Security headers (inherited only where no location adds its
    #     own add_header — nginx replaces, doesn't merge). They're
    #     repeated in /assets and / via the snippet below.
    include /etc/nginx/security-headers.conf;

    # ─── /healthz: liveness for Docker / orchestrators ──────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ─── /api/* → backend ───────────────────────────────────────────────
    # FastAPI exposes routes under /api/v1; keep the path intact.
    # No local add_header here, so server-level security headers apply.
    location /api/ {
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Hashed assets: long-lived, immutable ───────────────────────────
    # Vite emits content-hashed filenames under /assets/.
    # Re-includes security headers because the add_header below
    # would otherwise shadow the server-level set.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include    /etc/nginx/security-headers.conf;
        try_files  $uri =404;
    }

    # ─── SPA fallback: every other route serves index.html ──────────────
    # Don't cache the HTML shell so deploys roll out immediately.
    location / {
        add_header Cache-Control "no-cache" always;
        include    /etc/nginx/security-headers.conf;
        try_files  $uri $uri/ /index.html;
    }
}
