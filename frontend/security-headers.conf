# Security headers — included by every location that ships an
# add_header of its own (nginx REPLACES inherited add_header sets when
# a child block adds one, so we re-declare them per scope).

add_header X-Content-Type-Options    "nosniff"                          always;
add_header X-Frame-Options           "DENY"                             always;
add_header X-XSS-Protection          "1; mode=block"                    always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
# CSP: allow same-origin assets + inline styles (Tailwind), no eval,
# no inline scripts. Add hashes/nonces if you ever embed inline JS.
add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    always;
