<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="SecureStats dashboard placeholder">
  <!-- Background -->
  <rect width="1200" height="700" fill="#0f172a"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="700" fill="#020617"/>
  <text x="32" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff">SecureStats</text>
  <text x="32" y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#94a3b8">MLB analytics</text>

  <rect x="20" y="110" width="200" height="32" rx="6" fill="#1e293b"/>
  <text x="36" y="131" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Players</text>
  <text x="36" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#94a3b8">Leaders</text>
  <text x="36" y="206" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#94a3b8">Streaks</text>
  <text x="36" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#94a3b8">Compare</text>

  <!-- Header -->
  <line x1="240" y1="64" x2="1200" y2="64" stroke="#1e293b"/>
  <text x="272" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Signed in as</text>
  <text x="346" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">josephhcoonn</text>
  <rect x="1040" y="22" width="60" height="22" rx="11" fill="#10b98133" stroke="#10b98180"/>
  <text x="1070" y="38" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6ee7b7">admin</text>
  <rect x="1112" y="20" width="72" height="26" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="1148" y="38" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="500" fill="#e2e8f0">Sign out</text>

  <!-- Body title -->
  <text x="272" y="120" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Players</text>
  <text x="272" y="144" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Career batting aggregates across loaded games.</text>

  <!-- Search box -->
  <rect x="900" y="100" width="270" height="36" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="916" y="124" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Search by name…</text>

  <!-- Table header -->
  <rect x="272" y="180" width="900" height="36" fill="#0b1220"/>
  <text x="288" y="203" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">NAME</text>
  <text x="528" y="203" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">TEAM</text>
  <text x="824" y="203" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">POS</text>
  <text x="892" y="203" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">G</text>
  <text x="1010" y="203" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="0.05em">HR ▼</text>
  <text x="1080" y="203" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">RBI</text>
  <text x="1158" y="203" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">AVG</text>

  <!-- Rows -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#e2e8f0">
    <g>
      <text x="288" y="248">▸ Kyle Schwarber</text>
      <text x="528" y="248">Philadelphia Phillies</text>
      <text x="824" y="248">LF</text>
      <text x="892" y="248">56</text>
      <text x="1010" y="248" text-anchor="end">22</text>
      <text x="1080" y="248" text-anchor="end">48</text>
      <text x="1158" y="248" text-anchor="end">.276</text>
    </g>
    <g>
      <text x="288" y="284">▸ Aaron Judge</text>
      <text x="528" y="284">New York Yankees</text>
      <text x="824" y="284">RF</text>
      <text x="892" y="284">61</text>
      <text x="1010" y="284" text-anchor="end">20</text>
      <text x="1080" y="284" text-anchor="end">53</text>
      <text x="1158" y="284" text-anchor="end">.293</text>
    </g>
    <g>
      <text x="288" y="320">▸ Matt Olson</text>
      <text x="528" y="320">Atlanta Braves</text>
      <text x="824" y="320">1B</text>
      <text x="892" y="320">69</text>
      <text x="1010" y="320" text-anchor="end">20</text>
      <text x="1080" y="320" text-anchor="end">46</text>
      <text x="1158" y="320" text-anchor="end">.272</text>
    </g>
    <g>
      <text x="288" y="356">▸ Shea Langeliers</text>
      <text x="528" y="356">Athletics</text>
      <text x="824" y="356">C</text>
      <text x="892" y="356">64</text>
      <text x="1010" y="356" text-anchor="end">19</text>
      <text x="1080" y="356" text-anchor="end">41</text>
      <text x="1158" y="356" text-anchor="end">.244</text>
    </g>
    <g>
      <text x="288" y="392">▸ Munetaka Murakami</text>
      <text x="528" y="392">Chicago White Sox</text>
      <text x="824" y="392">3B</text>
      <text x="892" y="392">57</text>
      <text x="1010" y="392" text-anchor="end">18</text>
      <text x="1080" y="392" text-anchor="end">52</text>
      <text x="1158" y="392" text-anchor="end">.281</text>
    </g>
  </g>

  <!-- Row separators -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="272" y1="216" x2="1172" y2="216"/>
    <line x1="272" y1="260" x2="1172" y2="260"/>
    <line x1="272" y1="296" x2="1172" y2="296"/>
    <line x1="272" y1="332" x2="1172" y2="332"/>
    <line x1="272" y1="368" x2="1172" y2="368"/>
    <line x1="272" y1="404" x2="1172" y2="404"/>
  </g>

  <!-- Footer / pagination -->
  <text x="272" y="450" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">Showing 1–20 of 1,229</text>
  <rect x="980" y="432" width="70" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="1015" y="450" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#e2e8f0">← Prev</text>
  <text x="1083" y="450" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Page 1 of 62</text>
  <rect x="1118" y="432" width="70" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="1153" y="450" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#e2e8f0">Next →</text>

  <!-- Placeholder caption -->
  <text x="600" y="640" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#475569">
    Placeholder mockup — replace with a real PNG screenshot at docs/dashboard-screenshot.png
  </text>
  <text x="600" y="666" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#334155">
    `docker compose up --build` then screenshot http://localhost:8080/players
  </text>
</svg>
